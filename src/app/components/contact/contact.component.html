<section class="contact fade-in">
  <h2 class="section-title">Parliamo del tuo <span class="text-gradient">Progetto</span></h2>
  <div class="contact-container">
    <div class="glass-card contact-info">
      <h3>Informazioni</h3>
      <p>Siamo pronti ad ascoltare le tue idee e trasformarle in realtà digitale.</p>
      <ul class="info-list">
        <li><span class="icon">✉️</span> info@hi-tech.com</li>
        <li><span class="icon">📞</span> +39 012 3456789</li>
        <li><span class="icon">📍</span> Via dell'Innovazione, 1, Roma</li>
      </ul>
    </div>
    <form class="glass-card contact-form">
      <div class="form-group">
        <label for="name">Nome</label>
        <input type="text" id="name" name="name" placeholder="Il tuo nome">
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="La tua email">
      </div>
      <div class="form-group">
        <label for="message">Messaggio</label>
        <textarea id="message" name="message" rows="5" placeholder="Come possiamo aiutarti?"></textarea>
      </div>
      <button type="submit" class="btn btn-primary w-100">Invia Messaggio</button>
    </form>
  </div>
</section>
