<div class="faq-section-wrapper glass-card scroll-reveal">
  <div class="faq-header-content text-center">
    <h2 class="text-gradient">{{ 'FAQ.TITLE' | translate }}</h2>
    <p class="subtitle">{{ 'FAQ.SUBTITLE' | translate }}</p>
  </div>

  <!-- Search Bar -->
  <div class="faq-search-container">
    <div class="search-input-wrapper">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="search-icon"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
      <input 
        type="text" 
        [ngModel]="searchTerm()" 
        (ngModelChange)="searchTerm.set($event)" 
        [placeholder]="'FAQ.SEARCH_PLACEHOLDER' | translate"
        autocomplete="off"
        class="faq-search-input">
    </div>
  </div>

  <!-- Accordion List -->
  <div class="faq-accordion-list">
    @for (item of filteredFaqs(); track $index) {
      <div class="faq-item" [class.open]="item.open()">
        <button class="faq-trigger" (click)="toggleFaq(item)" aria-expanded="false">
          <span class="faq-question">{{ item.question }}</span>
          <span class="faq-icon-indicator">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-chevron-down"><polyline points="6 9 12 15 18 9"></polyline></svg>
          </span>
        </button>
        
        <div class="faq-answer-panel" [class.show]="item.open()">
          <div class="faq-answer-content">
            <p>{{ item.answer }}</p>
          </div>
        </div>
      </div>
    } @empty {
      <div class="faq-empty-state text-center">
        <p>{{ 'FAQ.NO_RESULTS' | translate }}</p>
      </div>
    }
  </div>

</div>
