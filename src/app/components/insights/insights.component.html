<section id="news" class="insights-section">
  <div class="section-header">
    <div class="animated-header">
      <div class="badge">{{ 'INSIGHTS.BADGE' | translate }}</div>
      <h2 class="section-title">H-Tech <span class="text-gradient">Insights</span></h2>
      <p class="section-subtitle">{{ 'INSIGHTS.SUBTITLE' | translate }}</p>
    </div>
  </div>

  <div class="news-grid">
    <article *ngFor="let item of newsItems" class="news-card glass-card scroll-reveal">
      <div class="news-image">
        <img [src]="item.image" [alt]="item.titleKey | translate" loading="lazy">
        <div class="category-tag">{{ item.categoryKey | translate }}</div>
      </div>
      <div class="news-content">
        <span class="date">{{ item.date | date:'dd MMMM yyyy' }}</span>
        <h3>{{ item.titleKey | translate }}</h3>
        <p>{{ item.excerptKey | translate }}</p>
        <a [href]="item.link" target="_blank" rel="noopener noreferrer" class="read-more">
          {{ 'INSIGHTS.READ_MORE' | translate }}
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
        </a>
      </div>
    </article>
  </div>
</section>
