<div class="dashboard-layout">

  <main class="main-view">

    <section id="home" class="hero dashboard-hero-split">
      <div class="hero-content-split">

        <div class="hero-text-side cinematic-text-slide">
          <h1 class="fade-in">
            {{ 'HOME.HERO.TITLE' | translate }}
            <span class="text-gradient">{{ 'HOME.HERO.SUBTITLE' | translate }}</span>
          </h1>
          <p class="fade-in-delayed">{{ 'HOME.HERO.DESC' | translate }}</p>
          <div class="cta fade-in-delayed">
            <a routerLink="/services" class="btn btn-primary">{{ 'HOME.HERO.CTA_SERVICES' | translate }}</a>
            <a routerLink="/contact" class="btn btn-outline">{{ 'HOME.HERO.CTA_CONTACT' | translate }}</a>
          </div>
        </div>

        <div class="hero-image-side cinematic-image-reveal">
          <img
            src="https://images.unsplash.com/photo-1460925895917-afdab827c52f?auto=format&fit=crop&fm=webp&q=60&w=700"
            srcset="
            https://images.unsplash.com/photo-1460925895917-afdab827c52f?auto=format&fit=crop&fm=webp&q=50&w=400 400w,
            https://images.unsplash.com/photo-1460925895917-afdab827c52f?auto=format&fit=crop&fm=webp&q=60&w=700 700w"
            sizes="(max-width: 600px) 100vw, 700px"
            alt="Sviluppo Software e Dashboard Dashboard B2B Hi-Tech"
            class="dashboard-core-img"
            width="700"
            height="499"
            loading="eager"
            fetchpriority="high">
        </div>

      </div>

      <div class="hero-bg-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
      </div>
    </section>

    <div class="content-sections">

      <section id="about" #animatedSection class="glass-card section-wrapper scroll-animate">
        <app-about></app-about>
      </section>

      <section id="services" #animatedSection class="glass-card section-wrapper scroll-animate delay-1">
        <app-services></app-services>
      </section>

      <section id="tech-matcher" #animatedSection class="scroll-animate">
        <app-tech-matcher></app-tech-matcher>
      </section>
