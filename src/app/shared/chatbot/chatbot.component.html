<div class="chatbot-container" [class.open]="isOpen()">
  
  <!-- Toggle Floating Button -->
  <button class="chatbot-toggle" (click)="toggleChat()" aria-label="Toggle AI Chatbot">
    @if (isOpen()) {
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-x"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
    } @else {
      <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-message-circle"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
      <span class="ping-badge"></span>
    }
  </button>

  <!-- Chat Window (Glassmorphic Card) -->
  @if (isOpen()) {
    <div class="chatbot-window glass-card">
      <div class="chatbot-header">
        <div class="chatbot-avatar-container">
          <div class="chatbot-avatar">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-cpu"><rect x="4" y="4" width="16" height="16" rx="2" ry="2"></rect><rect x="9" y="9" width="6" height="6"></rect><line x1="9" y1="1" x2="9" y2="4"></line><line x1="15" y1="1" x2="15" y2="4"></line><line x1="9" y1="20" x2="9" y2="23"></line><line x1="15" y1="20" x2="15" y2="23"></line><line x1="20" y1="9" x2="23" y2="9"></line><line x1="20" y1="15" x2="23" y2="15"></line><line x1="1" y1="9" x2="4" y2="9"></line><line x1="1" y1="15" x2="4" y2="15"></line></svg>
          </div>
          <div class="chatbot-title-info">
            <h3>{{ 'CHATBOT.HEADER' | translate }}</h3>
            <span class="status-online">{{ 'CHATBOT.SUBTITLE' | translate }}</span>
          </div>
        </div>
        <button class="chatbot-close-btn" (click)="toggleChat()">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-minus"><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        </button>
      </div>

      <!-- Chat Messages Container -->
      <div class="chatbot-messages" #scrollContainer>
        @for (msg of messages(); track $index) {
          <div class="chat-bubble-wrapper" [class.user]="msg.role === 'user'">
            <div class="chat-bubble" [class.user]="msg.role === 'user'">
              <p>{{ msg.content }}</p>
            </div>
          </div>
        }

        <!-- Loading / Typing Indicator -->
        @if (isLoading()) {
          <div class="chat-bubble-wrapper">
            <div class="chat-bubble typing-bubble">
              <span class="dot"></span>
              <span class="dot"></span>
              <span class="dot"></span>
            </div>
          </div>
        }
      </div>

      <!-- Chat Input Area -->
      <form class="chatbot-input-area" (ngSubmit)="sendMessage()">
        <input 
          type="text" 
          [ngModel]="userInput()" 
          (ngModelChange)="userInput.set($event)" 
          name="userInput"
          [placeholder]="'CHATBOT.PLACEHOLDER' | translate" 
          [disabled]="isLoading()"
          autocomplete="off">
        <button type="submit" [disabled]="!userInput().trim() || isLoading()" aria-label="Send message">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-send"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
        </button>
      </form>
    </div>
  }
</div>
